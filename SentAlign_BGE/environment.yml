name: SentAlignBGE
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10               # Subimos a 3.10 para mejor soporte de modelos nuevos
  - pytorch                   # Instalará la última versión estable (2.x)
  - pytorch-cuda=12.1         # Asegura soporte moderno de GPU
  - numpy                     # Última versión
  - cython                    # NECESARIO para tus archivos .pyx (pyximport)
  - pip
  - pip:
      - transformers          # Instalará la última versión (4.40+)
      - sentencepiece         # Necesario para BGE-M3
      - protobuf
      - accelerate            # Optimización necesaria para modelos grandes